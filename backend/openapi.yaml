openapi: 3.0.0
info:
  title: Easy SKS API
  version: 1.0.0
  description: API for the Easy SKS flashcard study application

servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  /:
    get:
      summary: Root endpoint
      operationId: root
      tags: [General]
      responses:
        "200":
          description: Welcome message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /health:
    get:
      summary: Health check
      operationId: health_check
      tags: [General]
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /topics:
    get:
      summary: List available SKS topics
      operationId: list_topics
      tags: [Study]
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /me:
    get:
      summary: Get account summary for current user
      operationId: get_me
      tags: [User]
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /me/profile:
    patch:
      summary: Update current user's profile fields
      operationId: patch_me_profile
      tags: [User]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Updated account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "400":
          description: Invalid profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Mobile number already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/checkout-session:
    post:
      summary: Create Stripe checkout session for premium plan
      operationId: create_checkout_session
      tags: [Billing]
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "503":
          description: Stripe checkout is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/customer-portal-session:
    post:
      summary: Create Stripe customer portal session
      operationId: create_customer_portal_session
      tags: [Billing]
      responses:
        "200":
          description: Customer portal session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPortalSessionResponse"
        "404":
          description: No Stripe customer available for this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe customer portal is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/webhook/stripe:
    post:
      summary: Stripe webhook receiver
      operationId: stripe_webhook
      tags: [Billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook accepted and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeWebhookReceiptResponse"
        "400":
          description: Invalid Stripe signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe webhook is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/subscription:
    get:
      summary: Read current subscription snapshot for the authenticated user
      operationId: get_subscription
      tags: [Billing]
      responses:
        "200":
          description: Current subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSubscriptionResponse"

  /study/due:
    get:
      summary: Get cards due for review
      operationId: get_due_cards
      tags: [Study]
      parameters:
        - name: topic
          in: query
          required: false
          schema:
            type: string
            enum:
              - navigation
              - schifffahrtsrecht
              - wetterkunde
              - seemannschaft_i
              - seemannschaft_ii
      responses:
        "200":
          description: List of due study cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudyCardResponse"

  /study/practice:
    get:
      summary: Get cards for practice mode (not limited to due cards)
      operationId: get_practice_cards
      tags: [Study]
      parameters:
        - name: topic
          in: query
          required: false
          schema:
            type: string
            enum:
              - navigation
              - schifffahrtsrecht
              - wetterkunde
              - seemannschaft_i
              - seemannschaft_ii
      responses:
        "200":
          description: List of practice study cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudyCardResponse"

  /dashboard/summary:
    get:
      summary: Get aggregate dashboard summary for current user
      operationId: get_dashboard_summary
      tags: [Study]
      responses:
        "200":
          description: Dashboard KPI summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"

  /study/review:
    post:
      summary: Review a card with a rating
      operationId: review_card
      tags: [Study]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRequest"
      responses:
        "200":
          description: Updated study card after review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyCardResponse"
        "404":
          description: Card or scheduling info not found

  /study/evaluate-answer:
    post:
      summary: Evaluate a free-text answer for one study card
      operationId: evaluate_answer
      tags: [Study]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateAnswerRequest"
      responses:
        "200":
          description: Structured answer evaluation payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateAnswerResponse"
        "404":
          description: Card or scheduling info not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Evaluator not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{card_id}:
    get:
      summary: Get a card by ID
      operationId: get_card
      tags: [Cards]
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"
        "404":
          description: Card not found

  /exams:
    get:
      summary: List available official exam sheets
      operationId: list_exams
      tags: [Exams]
      responses:
        "200":
          description: Available exam templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamTemplateResponse"

  /exam-sessions:
    get:
      summary: List completed exam sessions for current user
      operationId: list_exam_history
      tags: [Exams]
      responses:
        "200":
          description: Completed exam sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamSessionHistoryResponse"
    post:
      summary: Start a new exam session
      operationId: start_exam_session
      tags: [Exams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartExamSessionRequest"
      responses:
        "200":
          description: Started exam session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamSessionResponse"
        "400":
          description: Invalid sheet or unavailable questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam-sessions/{session_id}:
    get:
      summary: Fetch exam session details
      operationId: get_exam_session
      tags: [Exams]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exam session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamSessionResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam-sessions/{session_id}/answers/{card_id}:
    put:
      summary: Save or update one answer during an active exam session
      operationId: save_exam_answer
      tags: [Exams]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: card_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveExamAnswerRequest"
      responses:
        "200":
          description: Persisted answer row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveExamAnswerResponse"
        "400":
          description: Session not editable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session or card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam-sessions/{session_id}/submit:
    post:
      summary: Submit and evaluate an exam session
      operationId: submit_exam_session
      tags: [Exams]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evaluated exam result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResultResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam-sessions/{session_id}/result:
    get:
      summary: Fetch the evaluated exam result
      operationId: get_exam_result
      tags: [Exams]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evaluated exam result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResultResponse"
        "400":
          description: Result not available yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    Topic:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
      required: [value, label]

    MeResponse:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
          nullable: true
        full_name:
          type: string
          nullable: true
        mobile_number:
          type: string
          nullable: true
        profile_complete:
          type: boolean
        roles:
          type: array
          items:
            type: string
        plan:
          type: string
        entitlements:
          type: array
          items:
            type: string
        billing_status:
          type: string
          nullable: true
        renews_at:
          type: string
          format: date-time
          nullable: true
        cancels_at:
          type: string
          format: date-time
          nullable: true
      required: [user_id, profile_complete, roles, plan, entitlements]

    ProfileUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
        mobile_number:
          type: string
      required: [full_name, mobile_number]

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]

    CheckoutSessionResponse:
      type: object
      properties:
        checkout_url:
          type: string
      required: [checkout_url]

    CustomerPortalSessionResponse:
      type: object
      properties:
        portal_url:
          type: string
      required: [portal_url]

    StripeWebhookReceiptResponse:
      type: object
      properties:
        received:
          type: boolean
        event_type:
          type: string
      required: [received, event_type]

    BillingSubscriptionResponse:
      type: object
      properties:
        provider:
          type: string
        status:
          type: string
          nullable: true
        plan:
          type: string
          enum: [freemium, premium]
        current_period_end:
          type: string
          format: date-time
          nullable: true
        price_id:
          type: string
          nullable: true
      required: [provider, plan]

    CardContentResponse:
      type: object
      properties:
        text:
          type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/CardImageResponse"
      required: [text, images]

    CardImageResponse:
      type: object
      properties:
        image_id:
          type: string
        storage_key:
          type: string
        alt_text:
          type: string
          nullable: true
      required: [image_id, storage_key]

    CardResponse:
      type: object
      properties:
        card_id:
          type: string
        front:
          $ref: "#/components/schemas/CardContentResponse"
        answer:
          $ref: "#/components/schemas/CardContentResponse"
        short_answer:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        exam_sheets:
          type: array
          items:
            type: integer
      required: [card_id, front, answer, short_answer, tags, exam_sheets]

    SchedulingInfoResponse:
      type: object
      properties:
        state:
          type: string
          enum: [NEW, LEARNING, REVIEW, RELEARNING]
        stability:
          type: number
        difficulty:
          type: number
        reps:
          type: integer
        lapses:
          type: integer
        due:
          type: string
          format: date-time
        last_review:
          type: string
          format: date-time
          nullable: true
      required: [state, stability, difficulty, reps, lapses, due]

    StudyCardResponse:
      type: object
      properties:
        card:
          $ref: "#/components/schemas/CardResponse"
        scheduling_info:
          $ref: "#/components/schemas/SchedulingInfoResponse"
      required: [card, scheduling_info]

    DashboardSummaryResponse:
      type: object
      properties:
        due_now:
          type: integer
        reviewed_today:
          type: integer
        streak_days:
          type: integer
        due_by_topic:
          type: object
          additionalProperties:
            type: integer
        recommended_topic:
          type: string
          nullable: true
        available_cards:
          type: integer
      required:
        - due_now
        - reviewed_today
        - streak_days
        - due_by_topic
        - available_cards

    ReviewRequest:
      type: object
      properties:
        card_id:
          type: string
        rating:
          type: integer
          enum: [1, 2, 3, 4]
          description: "1=Again, 2=Hard, 3=Good, 4=Easy"
      required: [card_id, rating]

    EvaluateAnswerRequest:
      type: object
      properties:
        card_id:
          type: string
        user_answer:
          type: string
      required: [card_id, user_answer]

    EvaluateAnswerResponse:
      type: object
      properties:
        card_id:
          type: string
        awarded_points:
          type: number
        max_points:
          type: number
        verdict:
          type: string
          enum: [full, partial, incorrect]
        reasoning_summary:
          type: string
        mistakes:
          type: array
          items:
            type: string
        missing_points:
          type: array
          items:
            type: string
        improved_answer_suggestion:
          type: string
        suggested_rating:
          type: integer
          enum: [1, 2, 3, 4]
      required:
        - card_id
        - awarded_points
        - max_points
        - verdict
        - reasoning_summary
        - mistakes
        - missing_points
        - improved_answer_suggestion
        - suggested_rating

    ExamTemplateResponse:
      type: object
      properties:
        sheet_number:
          type: integer
        display_name:
          type: string
        question_count:
          type: integer
        time_limit_minutes:
          type: integer
      required: [sheet_number, display_name, question_count, time_limit_minutes]

    StartExamSessionRequest:
      type: object
      properties:
        sheet_number:
          type: integer
          minimum: 1
          maximum: 15
        time_limit_minutes:
          type: integer
          minimum: 1
          maximum: 240
      required: [sheet_number]

    ExamQuestionResponse:
      type: object
      properties:
        question_number:
          type: integer
        card_id:
          type: string
        question_text:
          type: string
        question_images:
          type: array
          items:
            $ref: "#/components/schemas/CardImageResponse"
        student_answer:
          type: string
        answered_at:
          type: string
          format: date-time
          nullable: true
      required:
        - question_number
        - card_id
        - question_text
        - question_images
        - student_answer

    ExamSessionResponse:
      type: object
      properties:
        session_id:
          type: string
        sheet_number:
          type: integer
        status:
          type: string
        started_at:
          type: string
          format: date-time
        submitted_at:
          type: string
          format: date-time
          nullable: true
        deadline_at:
          type: string
          format: date-time
        time_limit_minutes:
          type: integer
        time_remaining_seconds:
          type: integer
        time_over:
          type: boolean
        question_count:
          type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ExamQuestionResponse"
      required:
        - session_id
        - sheet_number
        - status
        - started_at
        - deadline_at
        - time_limit_minutes
        - time_remaining_seconds
        - time_over
        - question_count
        - questions

    SaveExamAnswerRequest:
      type: object
      properties:
        student_answer:
          type: string
      required: [student_answer]

    SaveExamAnswerResponse:
      type: object
      properties:
        session_id:
          type: string
        card_id:
          type: string
        question_number:
          type: integer
        student_answer:
          type: string
        answered_at:
          type: string
          format: date-time
          nullable: true
      required: [session_id, card_id, question_number, student_answer]

    ExamQuestionResultResponse:
      type: object
      properties:
        question_number:
          type: integer
        card_id:
          type: string
        question_text:
          type: string
        reference_short_answer:
          type: array
          items:
            type: string
        student_answer:
          type: string
        score:
          type: number
        is_correct:
          type: boolean
        feedback:
          type: string
        errors:
          type: array
          items:
            type: string
      required:
        - question_number
        - card_id
        - question_text
        - reference_short_answer
        - student_answer
        - score
        - is_correct
        - feedback
        - errors

    ExamResultResponse:
      type: object
      properties:
        session_id:
          type: string
        sheet_number:
          type: integer
        status:
          type: string
        started_at:
          type: string
          format: date-time
        submitted_at:
          type: string
          format: date-time
          nullable: true
        time_limit_minutes:
          type: integer
        time_over:
          type: boolean
        total_score:
          type: number
        max_score:
          type: number
        passed:
          type: boolean
        pass_score_threshold:
          type: number
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ExamQuestionResultResponse"
      required:
        - session_id
        - sheet_number
        - status
        - started_at
        - time_limit_minutes
        - time_over
        - total_score
        - max_score
        - passed
        - pass_score_threshold
        - questions

    ExamSessionHistoryResponse:
      type: object
      properties:
        session_id:
          type: string
        sheet_number:
          type: integer
        status:
          type: string
        started_at:
          type: string
          format: date-time
        submitted_at:
          type: string
          format: date-time
          nullable: true
        total_score:
          type: number
          nullable: true
        max_score:
          type: number
          nullable: true
        passed:
          type: boolean
          nullable: true
        time_over:
          type: boolean
      required: [session_id, sheet_number, status, started_at, time_over]
