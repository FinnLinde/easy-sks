services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easy_sks}
      POSTGRES_USER: ${POSTGRES_USER:-easy_sks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easy_sks}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: ${BACKEND_IMAGE:-easy-sks/backend:local}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://easy_sks:easy_sks@db:5432/easy_sks}
      SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-false}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000}
      AUTH_COGNITO_USER_POOL_ID: ${AUTH_COGNITO_USER_POOL_ID:-}
      AUTH_COGNITO_REGION: ${AUTH_COGNITO_REGION:-}
      AUTH_COGNITO_APP_CLIENT_ID: ${AUTH_COGNITO_APP_CLIENT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_PREMIUM: ${STRIPE_PRICE_ID_PREMIUM:-}
      STRIPE_CHECKOUT_SUCCESS_URL: ${STRIPE_CHECKOUT_SUCCESS_URL:-}
      STRIPE_CHECKOUT_CANCEL_URL: ${STRIPE_CHECKOUT_CANCEL_URL:-}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-}
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-18000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    image: ${FRONTEND_IMAGE:-easy-sks/frontend:local}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      RUNTIME_API_URL: ${RUNTIME_API_URL:-http://localhost:8000}
      RUNTIME_COGNITO_DOMAIN: ${RUNTIME_COGNITO_DOMAIN:-}
      RUNTIME_COGNITO_CLIENT_ID: ${RUNTIME_COGNITO_CLIENT_ID:-}
      RUNTIME_COGNITO_REDIRECT_URI: ${RUNTIME_COGNITO_REDIRECT_URI:-}
      RUNTIME_COGNITO_LOGOUT_URI: ${RUNTIME_COGNITO_LOGOUT_URI:-}
      RUNTIME_COGNITO_SCOPES: ${RUNTIME_COGNITO_SCOPES:-openid email profile}
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-13000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  db-data:
