services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easy_sks}
      POSTGRES_USER: ${POSTGRES_USER:-easy_sks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easy_sks}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easy_sks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-easy_sks}:${POSTGRES_PASSWORD:-easy_sks}@db:5432/${POSTGRES_DB:-easy_sks}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000}
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed --if-empty &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db-data:
